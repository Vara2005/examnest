<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>ExamNest Login</title>

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/theme.css">

</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="container d-flex justify-content-center align-items-center vh-100">
    <div class="card shadow p-4" style="width: 400px;">

        <h3 class="text-center mb-4">ExamNest Login</h3>

        <form action="/login" method="post">

            <div class="mb-3">
                <label class="form-label">Username</label>
                <input type="text" name="username" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-control" required>
            </div>
			<div class="form-check mb-3">
			    <input class="form-check-input"
			           type="checkbox"
			           name="rememberMe"
			           id="rememberMe">
			    <label class="form-check-label" for="rememberMe">
			        Remember Me
			    </label>
			</div>

            <div class="d-grid">
                <button type="submit" class="btn btn-primary">Login</button>
            </div>

        </form>

        <p class="text-danger text-center mt-3" th:text="${error}"></p>

        <div class="d-flex justify-content-between mt-3">
		    <a href="/forgot-password" class="text-decoration-none small">
		        Forgot Password?
		    </a>
		    <a href="/register" class="text-decoration-none small">
		        Create Account
		    </a>
		</div>

    </div>
</div>

<script src="/js/theme.js"></script>

</body>
</html>
